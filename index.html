<!DOCTYPE html>
<html>
<head>
<title>Slot Booking</title>
<style>
body{
font-family: Arial;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:50%;
}

th,td{
border:1px solid black;
padding:10px;
}

button{
padding:6px 10px;
background-color:green;
color:white;
border:none;
}
</style>
</head>

<body>

<h2>Available Slots</h2>

<table>
<tr>
<th>Slot Time</th>
<th>Action</th>
</tr>

<tr>
<td>10:00 AM - 10:30 AM</td>
<td>
<form action="book.html" method="get">
<input type="hidden" name="slot" value="10:00 AM - 10:30 AM">
<button type="submit">Book</button>
</form>
</td>
</tr>

<tr>
<td>10:30 AM - 11:00 AM</td>
<td>
<form action="book.html" method="get">
<input type="hidden" name="slot" value="10:30 AM - 11:00 AM">
<button type="submit">Book</button>
</form>
</td>
</tr>

<tr>
<td>11:00 AM - 11:30 AM</td>
<td>
<form action="book.html" method="get">
<input type="hidden" name="slot" value="11:00 AM - 11:30 AM">
<button type="submit">Book</button>
</form>
</td>
</tr>

</table>

<br>

<a href="bookings.html">View Booked Slots</a>

</body>
</html>
